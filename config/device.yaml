device:
  name: galen-demo-device
  firmware_version: "0.1.0"
  sample_rate_hz: 30

preprocess:
  blur_kernel: 5
  blur_sigma: 1.2
  filter_mode: gaussian
  normalize: true
  clip_percentile: [1.0, 99.0]

thresholds:
  min_mean_intensity: 40.0
  max_mean_intensity: 220.0
  min_contrast_std: 12.0
  max_noise_estimate: 18.0
  min_hot_pixel_fraction: 0.002
